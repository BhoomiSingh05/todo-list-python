<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>My To-Do List</h1>

        <form action="/add" method="POST" class="input-box">
            <input
                type="text"
                name="task"
                id="taskInput"
                placeholder="Enter a task..."
                required
            >
            <button type="submit">
                Add Task
            </button>
        </form>

        <div class="lists">

            <div class="list-section">
                <h2>Tasks</h2>
                <div id="taskList">
                    {% for task in tasks %}
                        <div class="task">
                            • {{ task }}
                            <form action="/delete/{{ loop.index0 }}" method="POST" style="display:inline;">
                                <button type="submit" class="delete">Delete</button>
                            </form>
                        </div>
                    {% endfor %}
                </div>
            </div>

            <div class="list-section" style="text-align: right;">
                <h2>History</h2>
                <div id="historyList">
                    {% for item in history %}
                        <div class="task">• {{ item }}</div>
                    {% endfor %}
                </div>
            </div>

        </div>

    </div>

</body>
</html>
